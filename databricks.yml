bundle:
  name: ehr-writeback

variables:
  catalog:
    description: Unity Catalog name to deploy into (for example, your workspace catalog on Databricks Free Edition)
  schema:
    description: Schema within the catalog
    default: default
  fhir_base_url:
    description: Base URL for the FHIR endpoint used by Databricks writeback jobs
    default: https://hapi.fhir.org/baseR4

targets:
  dev:
    mode: development
    default: true

  staging:
  prod:
    mode: production

include:
  - resources/*.yml
