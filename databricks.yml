bundle:
  name: ehr-writeback

workspace:
  host: ${var.databricks_host}

variables:
  databricks_host:
    description: Databricks workspace URL
  catalog:
    description: Unity Catalog name to deploy into (for example, your workspace catalog on Databricks Free Edition)
  schema:
    description: Schema within the catalog
    default: default

targets:
  dev:
    mode: development
    default: true

  staging:
  prod:
    mode: production

include:
  - resources/*.yml
