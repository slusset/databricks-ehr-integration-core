resources:
  jobs:
    ehr_writeback_demo_setup:
      name: "ehr-writeback-demo-setup"
      tasks:
        - task_key: seed_demo_environment
          notebook_task:
            notebook_path: ../src/ehr_writeback/pipelines/setup_demo_environment.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              seed_count: "10"

    ehr_writeback_job:
      name: "ehr-writeback-batch"
      environments:
        - environment_key: writeback_env
          spec:
            environment_version: "4"
            dependencies:
              - ${workspace.file_path}
      schedule:
        quartz_cron_expression: "0 0 */4 * * ?"  # every 4 hours
        timezone_id: America/New_York
      tasks:
        - task_key: prepare_writeback_batch
          pipeline_task:
            pipeline_id: ${resources.pipelines.ehr_writeback_pipeline.id}
        - task_key: execute_writeback_batch
          depends_on:
            - task_key: prepare_writeback_batch
          environment_key: writeback_env
          notebook_task:
            notebook_path: ../src/ehr_writeback/pipelines/execute_writeback_batch.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              fhir_base_url: ${var.fhir_base_url}
              batch_limit: "100"

    ehr_writeback_dead_letter_reprocess:
      name: "ehr-writeback-dead-letter-reprocess"
      environments:
        - environment_key: writeback_env
          spec:
            environment_version: "4"
            dependencies:
              - ${workspace.file_path}
      schedule:
        quartz_cron_expression: "0 0 8 * * ?"  # daily at 8am
        timezone_id: America/New_York
      tasks:
        - task_key: reprocess_dead_letters
          environment_key: writeback_env
          notebook_task:
            notebook_path: ../src/ehr_writeback/pipelines/reprocess_dead_letters.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              fhir_base_url: ${var.fhir_base_url}

    ehr_writeback_demo_validation:
      name: "ehr-writeback-demo-validation"
      tasks:
        - task_key: summarize_demo_results
          notebook_task:
            notebook_path: ../src/ehr_writeback/pipelines/validate_demo_run.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
